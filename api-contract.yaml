openapi: 3.0.0
info:
  title: 宝可梦 MUD 游戏核心 API
  description: 软件工程 Sprint 3 Mock 环境接口契约
  version: 1.0.0

servers:
  - url: http://127.0.0.1:4010

paths:
  /api/player/status:
    get:
      summary: 获取玩家当前状态与位置信息
      description: 对应 C++ 中的 Game::printCurrentLocationInfo 与 Game::showStatus
      responses:
        '200':
          description: 请求成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  playerName:
                    type: string
                  currentLocation:
                    type: string
                  locationDescription:
                    type: string
                  totalPokeBalls:
                    type: integer
                  teamCount:
                    type: integer
                  maxTeamSize:
                    type: integer
              example:
                playerName: Red
                currentLocation: 新手村
                locationDescription: 一个宁静的小村庄，训练家们在这里开始他们的旅程
                totalPokeBalls: 14
                teamCount: 1
                maxTeamSize: 6

  /api/game/move:
    post:
      summary: 玩家移动
      description: 对应 C++ 中的 Map::tryMove
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - direction
              properties:
                direction:
                  type: string
                  enum:
                    - e
                    - w
                    - s
                    - n
            example:
              direction: e
      responses:
        '200':
          description: 移动结算结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  encounterWildPokemon:
                    type: boolean
                  wildPokemonSpecies:
                    type: string
                    nullable: true
              example:
                success: true
                message: 向东移动，来到了【望风坡】
                encounterWildPokemon: true
                wildPokemonSpecies: 波波
        '400':
          description: 移动失败（方向无路）
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
              example:
                success: false
                message: 无法移动！那个方向没有路。

  /api/battle/action:
    post:
      summary: 执行战斗回合动作
      description: 对应 C++ Battle::run 循环中的玩家选项（技能、精灵球、治疗、更换、逃跑）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - actionType
              properties:
                actionType:
                  type: integer
                  enum:
                    - 1
                    - 2
                    - 3
                    - 4
                    - 5
                targetIndex:
                  type: integer
            example:
              actionType: 1
              targetIndex: 0
      responses:
        '200':
          description: 回合结算日志与状态更新
          content:
            application/json:
              schema:
                type: object
                properties:
                  battleEnded:
                    type: boolean
                  actionLog:
                    type: string
                  playerPokeHp:
                    type: integer
                  enemyPokeHp:
                    type: integer
              example:
                battleEnded: false
                actionLog: 小火龙使用了撞击，造成了12点伤害
                playerPokeHp: 25
                enemyPokeHp: 8
        '400':
          description: 参数错误
          content:
            application/json:
              schema:
                type: object
                properties:
                  battleEnded:
                    type: boolean
                  actionLog:
                    type: string
              example:
                battleEnded: false
                actionLog: 无效操作或参数错误