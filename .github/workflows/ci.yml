name: C++ CI Build

on:
  push:
    branches: [ "develop", "main" ]
  pull_request:
    branches: [ "develop", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Compile Game
      run: |
        # 假设你们使用 g++ 编译所有 cpp 文件
        g++ -std=c++11 *.cpp -o pokemon_mud
        
    - name: Run Basic Test
      # 简单的测试：确保程序能执行并立刻退出（或者运行你们编写的独立测试脚本）
      run: ./pokemon_mud --help || true
