name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build solution
        run: msbuild .\PokeMonMud.sln /p:Configuration=Debug

      - name: Run unit tests
        run: |
          $vstest = Get-ChildItem 'C:\Program Files\Microsoft Visual Studio\2022' -Recurse -Filter vstest.console.exe -ErrorAction SilentlyContinue |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $vstest) {
            throw 'vstest.console.exe was not found on the GitHub Actions runner.'
          }
          Set-Location PokemonTestsNative\x64\Debug
          & $vstest PokemonTestsNative.dll /Logger:trx

      - name: Install server dependencies
        working-directory: .\server
        run: npm ci

      - name: Build server
        working-directory: .\server
        run: npm run build

      - name: Run server integration tests
        working-directory: .\server
        run: npm run test:integration
