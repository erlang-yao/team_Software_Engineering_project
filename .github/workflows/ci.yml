name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build solution
        run: msbuild .\PokeMonMud.sln /p:Configuration=Debug

      - name: Run unit tests
        run: |
          cd PokemonTestsNative\x64\Debug
          vstest.console.exe PokemonTestsNative.dll /Logger:trx